<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitPulse Configuration</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <div class="header-content">
        <a href="https://github.com/DavidKozdra/GitPulse" target="_blank" class="logo-link">
          <img src="./icon.png" alt="GitPulse" class="logo">
        </a>
        <div class="header-text">
          <h1 class="popup-title">GitPulse</h1>
          <p class="popup-subtitle">Configuration</p>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="popup-content">
      <!-- GitHub PAT Section -->
      <div class="section">
        <div class="section-header">
          <h3 class="section-title">Authentication</h3>
        </div>
        <div class="form-group">
          <label for="pat" class="form-label">GitHub Personal Access Token</label>
          <div class="input-with-button">
            <input type="password" id="pat" maxlength="255" class="form-input" placeholder="ghp_..."/>
            <button type="button" id="togglePat" class="icon-button" title="Toggle visibility">
              <span class="eye-icon">👁️</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Preview Section -->
      <div class="section">
        <div class="section-header">
          <h3 class="section-title">Preview</h3>
        </div>
        <div class="preview-panel" id="previewPanel">
          <div class="preview-state-tabs" role="tablist" aria-label="Preview status">
            <button type="button" class="preview-state-btn active" data-preview-state="active">Active</button>
            <button type="button" class="preview-state-btn" data-preview-state="inactive">Inactive</button>
            <button type="button" class="preview-state-btn" data-preview-state="private">Private</button>
            <button type="button" class="preview-state-btn" data-preview-state="rate_limited">Limited</button>
          </div>

          <div class="preview-banner-surface">
            <div class="preview-banner-pill" id="previewBannerPill"></div>
            <div class="preview-details" id="previewDetails"></div>
          </div>

          <div class="preview-link-row">
            <span class="preview-link-label">Link</span>
            <a href="#" class="preview-link" id="previewLink"></a>
          </div>

          <div class="preview-score-row">
            <div class="preview-score-main">
              <span class="preview-score-value" id="previewScoreValue"></span>
              <span class="preview-score-label" id="previewScoreLabel"></span>
            </div>
            <div class="preview-score-mode" id="previewScoreMode"></div>
          </div>

          <div class="preview-breakdown" id="previewBreakdown"></div>
        </div>
      </div>

      <!-- Repository Settings Section -->
      <div class="section">
        <div class="section-header">
          <h3 class="section-title">Repository Settings</h3>
        </div>
        <div class="forms-container"></div>
      </div>
    </div>

    <!-- Footer Actions -->
    <div class="popup-footer">
      <button id="saveBtn" class="btn btn-primary">
        <span class="btn-text">Save Configuration</span>
      </button>
      <button id="clearBtn" class="btn btn-secondary">
        <span class="btn-text">Reset to Defaults</span>
      </button>
    </div>
  </div>

  <script src="emoji.js"></script>
  <script src="popup.js"></script>
  <script src="compat.js"></script>
  <script src="config.js"></script>
</body>
</html>
