<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extension Boilerplate</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <div class="header-content">
        <a href="#" target="_blank" class="logo-link" aria-label="Extension Boilerplate">
          <img src="./icon.svg" alt="Extension Boilerplate" class="logo">
        </a>
        <div class="header-text">
          <h1 class="popup-title">Extension Boilerplate</h1>
          <p class="popup-subtitle">Copy tab URLs</p>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="popup-content">
      <div class="section">
        <div class="section-header">
          <h3 class="section-title">Actions</h3>
        </div>
        <button id="copySelectedBtn" class="popup-btn">Copy selected tabs</button>
        <button id="copyAllBtn" class="popup-btn popup-btn-secondary">Copy all tabs</button>
        <p class="popup-body">Use the keyboard shortcut or the right-click menu for selected tabs.</p>
      </div>
    </div>

    <div class="popup-footer">
      <span class="popup-footer-note" id="statusText">Ready</span>
    </div>
  </div>

  <script src="popup.js"></script>
  <script src="compat.js"></script>
</body>
</html>
